#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME, Qogir-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM, wayland
env = GTK_THEME,Catppuccin-Dark
env = RUSTICL_ENABLE,radeonsi
env = HSA_OVERRIDE_GFX_VERSION,10.3.0

env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share
env = XDG_STATE_HOME,$HOME/.local/state

env = HISTFILE,$XDG_STATE_HOME/bash/history
env = CARGO_HOME,$XDG_DATA_HOME/cargo
env = DOTNET_CLI_HOME,$XDG_DATA_HOME/dotnet
env = GDBHISTFILE,$XDG_CONFIG_HOME/gdb/gdb_history
env = NODE_REPL_HISTORY,$XDG_STATE_HOME/node_repl_history

env = NPM_CONFIG_INIT_MODULE,$XDG_CONFIG_HOME/npm/config/npm-init.js
env = NPM_CONFIG_CACHE,$XDG_CACHE_HOME/npm
env = NPM_CONFIG_TMP,$XDG_RUNTIME_DIR/npm

env = PYTHON_HISTORY,$XDG_STATE_HOME/python_history
env = PYTHONSTARTUP,$XDG_CONFIG_HOME/python/pythonrc.py

env = WORKON_HOME,$XDG_DATA_HOME/virtualenvs

env = GTK2_RC_FILES,$XDG_CONFIG_HOME/gtk-2.0/gtkrc
env = XCURSOR_PATH,/usr/share/icons:$XDG_DATA_HOME/icons
env = INPUTRC,$XDG_CONFIG_HOME/readline/inputrc

env = ZDOTDIR,$XDG_CONFIG_HOME/zsh
env = HISTFILE,$XDG_STATE_HOME/zsh/history

env = WINEPREFIX,$XDG_DATA_HOME/wine