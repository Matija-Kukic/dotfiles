# Everforest Dark Hard — kitty
# 16 colors per the official sainnhe/everforest terminal port (bg0 base);
# UI sections derived from the palette, mirroring the catppuccin file layout.

# The basic colors
foreground              #d3c6aa
background              #272e33
selection_foreground    #272e33
selection_background    #d3c6aa

# Cursor colors
cursor                  #e69875
cursor_text_color       #272e33

# URL underline color when hovering with mouse
url_color               #7fbbb3

# Kitty window border colors
active_border_color     #a7c080
inactive_border_color   #414b50
bell_border_color       #dbbc7f

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #272e33
active_tab_background   #a7c080
inactive_tab_foreground #d3c6aa
inactive_tab_background #1e2326
tab_bar_background      #1e2326

# Colors for marks (marked text in the terminal)
