# Everforest Dark Hard — tmux (manual, self-contained)
# Faithful static replica of catppuccin/tmux v1.0.1 with the old config's
# options: rounded window pills, window flag icons ("icon" mode), connected
# user + directory status modules.
# Glyph codepoints verified against the installed FiraCode Nerd Font:
# caps U+E0B6/U+E0B4, block U+2588, user U+F007, dir U+F07B, flags
# U+F116B/U+F009E/U+F009B/U+F05AF/U+F05B0/U+F00C0/U+F004C.

# ── Status bar ──
set -g status-style "bg=#272e33,fg=#d3c6aa"
set -g status-left ""
set -g status-right "#[fg=#7fbbb3,nobold,nounderscore,noitalics]#[fg=#1e2326,bg=#7fbbb3] #[fg=#7fbbb3,bg=#374145]#[fg=#d3c6aa] #(whoami)#[fg=#374145]█#[fg=#d699b6,nobold,nounderscore,noitalics]#[fg=#1e2326,bg=#d699b6] #[fg=#d699b6,bg=#374145]#[fg=#d3c6aa] #{b:pane_current_path}#[fg=#374145]█"

# ── Window pills ( cap, █ joint,  cap) ──
# inactive: grey number block + surface0 name block
set -g window-status-format "#[fg=#9da9a0,bg=default]#[fg=#1e2326,bg=#9da9a0]#I#[fg=#9da9a0,bg=#2e383c]█#[fg=#d3c6aa,bg=#2e383c] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#2e383c,bg=default] "
# current: accent number block + surface1 name block
set -g window-status-current-format "#[fg=#a7c080,bg=default]#[fg=#1e2326,bg=#a7c080]#I#[fg=#a7c080,bg=#374145]█#[fg=#d3c6aa,bg=#374145] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#374145,bg=default] "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#dbbc7f,fg=#1e2326"
set -g window-status-bell-style "bg=#dbbc7f,fg=#1e2326"

# ── Panes ──
set -g pane-border-style "fg=#7a8478"
set -g pane-active-border-style "#{?pane_in_mode,fg=#7fbbb3,#{?pane_synchronized,fg=#a7c080,fg=#7fbbb3}}"

# ── Messages / modes / menus / popups ──
set -g message-style "fg=#7fbbb3,bg=#2e383c,align=centre"
set -g message-command-style "fg=#7fbbb3,bg=#2e383c,align=centre"
set -g mode-style "fg=#d699b6,bg=#414b50,bold"
set -g clock-mode-colour "#7fbbb3"
set -g menu-selected-style "fg=#2e383c,bg=#dbbc7f"
set -g popup-style "bg=#272e33,fg=#d3c6aa"
set -g popup-border-style "fg=#374145"
