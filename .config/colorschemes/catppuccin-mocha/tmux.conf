# Catppuccin Mocha — tmux (manual, self-contained)
# Faithful static replica of catppuccin/tmux v1.0.1 with the old config's
# options: rounded window pills, window flag icons ("icon" mode), connected
# user + directory status modules.
# Glyph codepoints verified against the installed FiraCode Nerd Font:
# caps U+E0B6/U+E0B4, block U+2588, user U+F007, dir U+F07B, flags
# U+F116B/U+F009E/U+F009B/U+F05AF/U+F05B0/U+F00C0/U+F004C.

# ── Status bar ──
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left ""
set -g status-right "#[fg=#89dceb,nobold,nounderscore,noitalics]#[fg=#11111b,bg=#89dceb] #[fg=#89dceb,bg=#45475a]#[fg=#cdd6f4] #(whoami)#[fg=#45475a]█#[fg=#f5c2e7,nobold,nounderscore,noitalics]#[fg=#11111b,bg=#f5c2e7] #[fg=#f5c2e7,bg=#45475a]#[fg=#cdd6f4] #{b:pane_current_path}#[fg=#45475a]█"

# ── Window pills ( cap, █ joint,  cap) ──
# inactive: grey number block + surface0 name block
set -g window-status-format "#[fg=#9399b2,bg=default]#[fg=#11111b,bg=#9399b2]#I#[fg=#9399b2,bg=#313244]█#[fg=#cdd6f4,bg=#313244] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#313244,bg=default] "
# current: accent number block + surface1 name block
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#11111b,bg=#cba6f7]#I#[fg=#cba6f7,bg=#45475a]█#[fg=#cdd6f4,bg=#45475a] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#45475a,bg=default] "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#f9e2af,fg=#11111b"
set -g window-status-bell-style "bg=#f9e2af,fg=#11111b"

# ── Panes ──
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "#{?pane_in_mode,fg=#b4befe,#{?pane_synchronized,fg=#cba6f7,fg=#b4befe}}"

# ── Messages / modes / menus / popups ──
set -g message-style "fg=#89dceb,bg=#313244,align=centre"
set -g message-command-style "fg=#89dceb,bg=#313244,align=centre"
set -g mode-style "fg=#f5c2e7,bg=#585b70,bold"
set -g clock-mode-colour "#89b4fa"
set -g menu-selected-style "fg=#313244,bg=#f9e2af"
set -g popup-style "bg=#1e1e2e,fg=#cdd6f4"
set -g popup-border-style "fg=#45475a"
