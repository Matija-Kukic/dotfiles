# Gruvbox Material Dark (medium) — tmux (manual, self-contained)
# Faithful static replica of catppuccin/tmux v1.0.1 with the old config's
# options: rounded window pills, window flag icons ("icon" mode), connected
# user + directory status modules.
# Glyph codepoints verified against the installed FiraCode Nerd Font:
# caps U+E0B6/U+E0B4, block U+2588, user U+F007, dir U+F07B, flags
# U+F116B/U+F009E/U+F009B/U+F05AF/U+F05B0/U+F00C0/U+F004C.

# ── Status bar ──
set -g status-style "bg=#282828,fg=#d4be98"
set -g status-left ""
set -g status-right "#[fg=#7daea3,nobold,nounderscore,noitalics]#[fg=#282828,bg=#7daea3] #[fg=#7daea3,bg=#45403d]#[fg=#d4be98] #(whoami)#[fg=#45403d]█#[fg=#d3869b,nobold,nounderscore,noitalics]#[fg=#282828,bg=#d3869b] #[fg=#d3869b,bg=#45403d]#[fg=#d4be98] #{b:pane_current_path}#[fg=#45403d]█"

# ── Window pills ( cap, █ joint,  cap) ──
# inactive: grey number block + surface0 name block
set -g window-status-format "#[fg=#928374,bg=default]#[fg=#282828,bg=#928374]#I#[fg=#928374,bg=#32302f]█#[fg=#d4be98,bg=#32302f] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#32302f,bg=default] "
# current: accent number block + surface1 name block
set -g window-status-current-format "#[fg=#a9b665,bg=default]#[fg=#282828,bg=#a9b665]#I#[fg=#a9b665,bg=#45403d]█#[fg=#d4be98,bg=#45403d] #W#{?window_activity_flag, 󱅫,}#{?window_bell_flag, 󰂞,}#{?window_silence_flag, 󰂛,}#{?window_active, 󰖯,}#{?window_last_flag, 󰖰,}#{?window_marked_flag, 󰃀,}#{?window_zoomed_flag, 󰁌,} #[fg=#45403d,bg=default] "
set -g window-status-separator ""
set -g window-status-activity-style "bg=#d8a657,fg=#282828"
set -g window-status-bell-style "bg=#d8a657,fg=#282828"

# ── Panes ──
set -g pane-border-style "fg=#7c6f64"
set -g pane-active-border-style "#{?pane_in_mode,fg=#7daea3,#{?pane_synchronized,fg=#a9b665,fg=#7daea3}}"

# ── Messages / modes / menus / popups ──
set -g message-style "fg=#7daea3,bg=#32302f,align=centre"
set -g message-command-style "fg=#7daea3,bg=#32302f,align=centre"
set -g mode-style "fg=#d3869b,bg=#5a524c,bold"
set -g clock-mode-colour "#7daea3"
set -g menu-selected-style "fg=#32302f,bg=#d8a657"
set -g popup-style "bg=#282828,fg=#d4be98"
set -g popup-border-style "fg=#45403d"
